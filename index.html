<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiwi Home</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #0a0e27;
        min-height: 100vh;
        padding: 20px;
        color: #fff;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* Animated Gradient Background */
      .gradient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
      }

      .gradient-bg::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 1000vh;
        background: linear-gradient(
          0deg,
          rgb(101, 91, 239) 0%,
          rgb(250, 40, 191) 20%,
          rgb(255, 70, 101) 40%,
          rgb(251, 222, 78) 60%,
          rgb(0, 251, 234) 80%,
          rgb(85, 93, 239) 100%
        );
        animation: gradientMove 17.5s ease-in-out infinite;
        opacity: 0.15;
      }

      @keyframes gradientMove {
        0% {
          top: 0;
        }
        50% {
          top: calc(100vh - 1000vh);
        }
        100% {
          top: 0;
        }
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        padding-top: 40px;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .time {
        font-size: 1.2em;
        opacity: 0.9;
      }

      .search-box {
        margin-bottom: 40px;
      }

      /* ========== SEARCH FORM ANIMATIONS ========== */
      .search-form {
        display: flex;
        position: relative;
        background: transparent;
        border: 1px solid #00d4ff;
        border-radius: 50px;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .search-form:hover {
        border-color: #00f0ff;
        transform: translateY(-2px);
      }

      /* Progress fill animation */
      .search-form::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, #00d4ff 0%, #0066ff 100%);
        border-radius: 50px;
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 0;
        opacity: 0;
      }

      .search-form.searching::before {
        width: 100%;
        opacity: 0.25;
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .search-input {
        flex: 1;
        border: none;
        padding: 18px 25px;
        font-size: 16px;
        outline: none;
        background: transparent;
        color: #ffffff;
        position: relative;
        z-index: 1;
        transition: all 0.3s ease;
      }

      .search-input::placeholder {
        color: #00d4ff;
        opacity: 0.6;
        transition: all 0.3s ease;
      }

      .search-form:hover .search-input::placeholder {
        color: #00f0ff;
        opacity: 0.8;
      }

      .search-form.searching .search-input {
        color: #00f0ff;
        font-weight: 500;
      }

      /* ========== SEARCH BUTTON WITH ARROW ========== */
      .search-btn {
        border: none;
        background: transparent;
        color: white;
        padding: 18px 30px;
        font-size: 0;
        cursor: pointer;
        position: relative;
        z-index: 1;
        overflow: visible;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        -webkit-tap-highlight-color: transparent;
      }

      /* CSS Arrow Icon */
      .search-btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 12px;
        height: 12px;
        border-right: 1.5px solid #00d4ff;
        border-top: 1.5px solid #00d4ff;
        transform: translate(-50%, -50%) rotate(45deg);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Arrow hover animation - nudge right */
      .search-btn:hover::before {
        transform: translate(-40%, -50%) rotate(45deg);
        border-color: #00f0ff;
      }

      /* Button hover effects */
      .search-btn:hover {
        transform: scale(1.05);
      }

      /* Button active/click feedback */
      .search-btn:active {
        transform: scale(0.95);
      }

      /* Pulse animation on searching */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .search-form.searching .search-btn::before {
        animation: pulse 1.5s infinite;
      }

      .quick-links {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
      }

      /* ========== SOCIAL BUTTON ANIMATIONS ========== */
      .youtube-btn,
      .amazon-btn,
      .pinterest-btn {
        position: relative;
        overflow: visible;
      }

      /* Checkmark SVG styling */
      .checkmark {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #fff;
        stroke-miterlimit: 10;
        opacity: 0;
        pointer-events: none;
      }

      .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: #fff;
        fill: none;
      }

      .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        stroke-width: 3;
        stroke: #fff;
        fill: none;
      }

      /* Animation keyframes */
      @keyframes checkmark-stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes checkmark-scale {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      @keyframes checkmark-fill {
        100% {
          box-shadow: inset 0px 0px 0px 30px currentColor;
        }
      }

      /* Active state animations */
      .youtube-btn.active .checkmark,
      .amazon-btn.active .checkmark,
      .pinterest-btn.active .checkmark {
        opacity: 1;
        animation: checkmark-scale 0.3s ease-in-out 0.9s both;
      }

      .youtube-btn.active .checkmark__circle,
      .amazon-btn.active .checkmark__circle,
      .pinterest-btn.active .checkmark__circle {
        animation: checkmark-stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }

      .youtube-btn.active .checkmark__check,
      .amazon-btn.active .checkmark__check,
      .pinterest-btn.active .checkmark__check {
        animation: checkmark-stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s
          forwards;
      }

      /* Hide original icon when active */
      .youtube-btn.active svg:first-child,
      .amazon-btn.active svg:first-child,
      .pinterest-btn.active svg:first-child {
        opacity: 0;
        transform: scale(0.8);
        transition: all 0.3s ease;
      }

      .youtube-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255, 0, 0, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        -webkit-tap-highlight-color: transparent;
      }

      .youtube-btn:hover:not(.active) {
        transform: scale(1.05);
        box-shadow:
          0 8px 25px rgba(255, 0, 0, 0.5),
          0 0 20px rgba(255, 0, 0, 0.3);
      }

      .youtube-btn svg:first-child {
        width: 24px;
        height: 24px;
        color: white;
        transition: all 0.3s ease;
      }

      .youtube-btn.active {
        background: rgb(255, 0, 0);
        box-shadow: 0 4px 20px rgba(255, 0, 0, 0.6);
      }

      .amazon-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        margin-left: 15px;
        -webkit-tap-highlight-color: transparent;
      }

      .amazon-btn:hover:not(.active) {
        transform: scale(1.05);
        box-shadow:
          0 8px 25px rgba(255, 153, 0, 0.5),
          0 0 20px rgba(255, 153, 0, 0.3);
      }

      .amazon-btn svg:first-child {
        width: 24px;
        height: 24px;
        color: white;
        transition: all 0.3s ease;
      }

      .amazon-btn.active {
        background: rgb(0, 0, 0);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }

      .pinterest-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(230, 0, 35, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        margin-left: 15px;
        -webkit-tap-highlight-color: transparent;
      }

      .pinterest-btn:hover:not(.active) {
        transform: scale(1.05);
        box-shadow:
          0 8px 25px rgba(230, 0, 35, 0.5),
          0 0 20px rgba(230, 0, 35, 0.3);
      }

      .pinterest-btn svg:first-child {
        width: 34px;
        height: 34px;
        margin-top: -2px;
        transition: all 0.3s ease;
      }

      .pinterest-btn.active {
        background: rgb(230, 0, 35);
        box-shadow: 0 4px 20px rgba(230, 0, 35, 0.6);
      }

      .link-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        text-decoration: none;
        color: white;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .link-card:active {
        transform: scale(0.95);
        background: rgba(255, 255, 255, 0.25);
      }

      .link-icon {
        font-size: 2em;
        margin-bottom: 10px;
        display: block;
      }

      .link-name {
        font-size: 0.9em;
        font-weight: 500;
      }

      .footer {
        text-align: center;
        opacity: 0.7;
        font-size: 0.9em;
        padding-top: 20px;
        padding-bottom: 50px;
        color: #00d4ff;
      }

      .yt-embed {
        display: flex;
        justify-content: center;
        margin-top: auto;
        margin-bottom: 10px;
      }

      .yt-embed iframe {
        border-radius: 10px;
        opacity: 0.85;
      }

      .yt-embed-wrapper {
        position: relative;
        display: inline-block;
      }

      .playlist-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 212, 255, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: all 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .playlist-btn:hover {
        background: rgba(0, 212, 255, 0.2);
        border-color: #00d4ff;
      }

      .playlist-btn svg {
        width: 13px;
        height: 13px;
        color: #00d4ff;
      }

      .playlist-popup {
        display: none;
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 14, 39, 0.95);
        border: 1px solid rgba(0, 212, 255, 0.4);
        border-radius: 10px;
        padding: 10px;
        width: 220px;
        z-index: 20;
        backdrop-filter: blur(10px);
      }

      .playlist-popup.open {
        display: block;
      }

      .playlist-popup input {
        width: 100%;
        background: transparent;
        border: 1px solid rgba(0, 212, 255, 0.4);
        border-radius: 6px;
        padding: 7px 10px;
        color: #fff;
        font-size: 12px;
        outline: none;
        box-sizing: border-box;
      }

      .playlist-popup input::placeholder {
        color: rgba(0, 212, 255, 0.5);
      }

      .playlist-popup-actions {
        display: flex;
        gap: 6px;
        margin-top: 7px;
      }

      .playlist-popup-actions button {
        flex: 1;
        padding: 6px;
        border-radius: 6px;
        border: none;
        font-size: 11px;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .playlist-confirm {
        background: #00d4ff;
        color: #0a0e27;
        font-weight: 600;
      }

      .playlist-cancel {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .playlist-popup-actions button:hover {
        opacity: 0.8;
      }

      .quote {
        text-align: center;
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 0.75em;
        color: #00d4ff;
        opacity: 0.5;
        font-style: italic;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.4;
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 2em;
        }

        .quick-links {
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
          gap: 12px;
        }

        .link-card {
          padding: 15px;
        }
      }
    </style>
  </head>

            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              encrypted-media;
              gyroscope;
              picture-in-picture;

            allowfullscreen
          ></iframe>
          <button
            class="playlist-btn"
            onclick="togglePlaylistPopup(event)"
            title="Load playlist"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"

              stroke-linejoin="round"

              <line x1="8" y1="6" x2="21" y2="6" />

          <div class="playlist-popup" id="playlistPopup">
            <input
              type="text"
              id="playlistInput"
              placeholder="Paste YouTube playlist URL"
            />
            <div class="playlist-popup-actions">
              <button class="playlist-confirm" onclick="loadPlaylist()">
                Load
              </button>
              <button class="playlist-cancel" onclick="closePlaylistPopup()">
                Cancel
              </button>

    </div>

    <script>
      // ========== QUOTE OF THE DAY ==========
      const quotes = [
        "to become who you want to be you need to sacrifice who you are",
        "have confidence in the very air that surrounds you",
        "you can't fix everything at once but you can fix something right now",
        "needing nothing attracts everything",
        "who am i to judge when i myself walk as an imperfect man",
        "you cannot suffer the past and future, because they do not exist",
        "in the war of ego the loser always wins",
        "being angry is like drinking poison and expecting the other person to die",
        "to be a star you must burn",
        "observe, but don't absorb",
        "the world is cruel, therefore i won't be",
        "comfort is the worst addiction",
        "a person chosen by god will never be chosen by humans",
      ];

      function getDayOfYear() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay);
      }

      // Set quote based on day of year
      const quoteIndex = getDayOfYear() % quotes.length;
      document.getElementById("quoteText").textContent = quotes[quoteIndex];

      // ========== SEARCH ANIMATION LOGIC ==========
      const searchForm = document.querySelector(".search-form");
      const searchInput = document.getElementById("searchInput");
      let originalPlaceholder = "";

      function searchOn(url, buttonElement) {
        const query = searchInput.value.trim();
        if (!query) return;

        // Trigger search bar animation
        triggerSearchAnimation();

        // Trigger checkmark animation on button
        if (buttonElement) {
          buttonElement.classList.add("active");
        }

        // Navigate after animation completes
        setTimeout(() => {
          window.location.href = url + encodeURIComponent(query);
        }, 1200);
      }

      // Handle search with animation
      function handleSearch(event) {
        event.preventDefault();
        const query = searchInput.value.trim();

        if (!query) return false;

        // Trigger search animation
        triggerSearchAnimation();

        // Check if it's a URL
        const urlPattern = /^(https?:\/\/)|(www\.)|(\w+\.\w+)/;

        setTimeout(() => {
          if (urlPattern.test(query)) {
            const url = query.startsWith("http") ? query : "https://" + query;
            window.location.href = url;
          } else {
            // Search on Google
            window.location.href =
              "https://www.google.com/search?q=" + encodeURIComponent(query);
          }
        }, 300);

        return false;
      }

      // Search animation function
      function triggerSearchAnimation() {
        searchForm.classList.add("searching");
        originalPlaceholder = searchInput.placeholder;
        searchInput.value = "Searching...";
        searchInput.style.pointerEvents = "none";
      }

      //Auto Focus
      document.querySelector(".container").addEventListener("click", () => {
        searchInput.focus();
      });
      // Prevent auto focus on these
      document.querySelectorAll(".social-button,.search-form").forEach((e) => {
        e.addEventListener("click", () => {
          e.stopPropagation();
        });
      });

      // ========== PLAYLIST LOADER ==========
      function togglePlaylistPopup(e) {
        e.stopPropagation();
        document.getElementById("playlistPopup").classList.toggle("open");
        setTimeout(() => document.getElementById("playlistInput").focus(), 50);
      }

      function closePlaylistPopup() {
        document.getElementById("playlistPopup").classList.remove("open");
      }

      function loadPlaylist() {
        const raw = document.getElementById("playlistInput").value.trim();
        const match = raw.match(/[?&]list=([a-zA-Z0-9_-]+)/);
        if (!match) {
          document.getElementById("playlistInput").style.borderColor =
            "rgba(255,80,80,0.7)";
          setTimeout(
            () =>
              (document.getElementById("playlistInput").style.borderColor = ""),
            1200,
          );
          return;
        }
        const listId = match[1];
        document.getElementById("yt-iframe").src =
          "https://www.youtube.com/embed/?listType=playlist&list=" +
          listId +
          "&enablejsapi=1&rel=0&playsinline=1&modestbranding=1&autoplay=1&index=0";
        closePlaylistPopup();
        document.getElementById("playlistInput").value = "";
      }

      // Close popup when tapping outside
      document.addEventListener("click", (e) => {
        const popup = document.getElementById("playlistPopup");
        if (
          popup.classList.contains("open") &&
          !popup.closest(".yt-embed-wrapper").contains(e.target)
        ) {
          closePlaylistPopup();
        }
      });
    </script>
  </body>
