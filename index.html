<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiwi Home</title>
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #0a0e27 url(images/wallpaper1.gif) no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        padding: 20px;
        color: #fff;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, var(--overlay-opacity, 0.55));
        z-index: 0;
        pointer-events: none;
      }

      /* Animated Gradient Background */
      .container {
        max-width: 600px;
        margin: 0 auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        padding-top: 40px;
      }

      .header h1 {
        font-size: 2.2em;
        margin-bottom: 10px;
        text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.5);
        font-family: "VT323", monospace;
        line-height: 1.6;
      }

      .time {
        font-size: 1.2em;
        opacity: 0.9;
      }

      .search-box {
        margin-bottom: 40px;
      }

      /* ========== SEARCH FORM ANIMATIONS ========== */
      .search-form {
        display: flex;
        position: relative;
        background: #05091c;
        border: 2px solid #cccccc;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
        transition: none;
        clip-path: polygon(
          3px 0%,
          calc(100% - 3px) 0%,
          100% 3px,
          100% calc(100% - 3px),
          calc(100% - 3px) 100%,
          3px 100%,
          0% calc(100% - 3px),
          0% 3px
        );
      }

      .search-form:hover {
        border-color: #cccccc;
        box-shadow: none;
      }

      .search-form::before {
        display: none;
      }

      /* Progress fill animation */
      .search-form::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, #00d4ff 0%, #0066ff 100%);
        border-radius: 50px;
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 0;
        opacity: 0;
      }

      .search-form.searching::before {
        width: 100%;
        opacity: 0.25;
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .search-input {
        flex: 1;
        border: none;
        padding: 16px 10px 16px 16px;
        font-size: 20px;
        outline: none;
        background: transparent;
        color: #ffffff;
        position: relative;
        z-index: 1;
        font-family: "VT323", monospace;
        caret-color: #ffffff;
      }

      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
        opacity: 1;
      }

      .search-form:hover .search-input::placeholder {
        color: #006688;
        opacity: 1;
      }

      .search-form.searching .search-input {
        color: #33eeff;
      }

      .search-btn {
        border: none;
        background: transparent;
        padding: 0 14px;
        cursor: pointer;
        position: relative;
        z-index: 1;
        transition: none;
        -webkit-tap-highlight-color: transparent;
        align-self: stretch;
        display: flex;
        align-items: center;
      }

      .search-btn img {
        width: 28px;
        height: 28px;
        image-rendering: pixelated;
        filter: invert(1);
        display: block;
        transition: transform 0.15s ease;
      }

      .search-btn:active img {
        animation: arrowSlide 0.4s ease forwards;
      }

      @keyframes arrowSlide {
        0% {
          transform: translateX(0);
        }
        40% {
          transform: translateX(8px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .search-form.searching .search-btn img {
        animation: arrowSlide 0.4s ease forwards;
      }

      /* Pulse animation on searching */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .search-form.searching .search-btn {
        animation: pulse 1.5s infinite;
      }

      .quick-links {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
      }

      /* ========== SOCIAL BUTTON ANIMATIONS ========== */
      .youtube-btn,
      .amazon-btn,
      .pinterest-btn {
        position: relative;
        overflow: visible;
      }

      .youtube-btn {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }

      .youtube-btn:hover:not(.active) {
        transform: translate(-2px, -2px);
      }

      .youtube-btn svg:first-child {
        display: none;
      }

      .youtube-btn.active {
        transform: translate(2px, 2px);
      }

      .amazon-btn {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        margin-left: 15px;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }

      .amazon-btn:hover:not(.active) {
        transform: translate(-2px, -2px);
      }

      .amazon-btn svg:first-child {
        display: none;
      }

      .amazon-btn.active {
        transform: translate(2px, 2px);
      }

      .pinterest-btn {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        margin-left: 15px;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }

      .pinterest-btn:hover:not(.active) {
        transform: translate(-2px, -2px);
      }

      .pinterest-btn svg:first-child {
        display: none;
      }

      .pinterest-btn.active {
        transform: translate(2px, 2px);
      }

      .link-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        text-decoration: none;
        color: white;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .link-card:active {
        transform: scale(0.95);
        background: rgba(255, 255, 255, 0.25);
      }

      .link-icon {
        font-size: 2em;
        margin-bottom: 10px;
        display: block;
      }

      .link-name {
        font-size: 0.9em;
        font-weight: 500;
      }

      .footer {
        text-align: center;
        opacity: 0.7;
        font-size: 0.85em;
        padding-top: 20px;
        padding-bottom: 50px;
        color: #00d4ff;
        font-family: "VT323", monospace;
        line-height: 2;
      }

      .pixel-icon {
        width: 48px;
        height: 48px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }

      .yt-icon {
        width: 48px;
        height: 48px;
        object-fit: cover;
      }

      .amazon-icon {
        background-image: url(images/amazonandpinterest.png);
        background-size: 200% 200%;
        background-position: 0% 50%;
      }

      .pinterest-icon {
        background-image: url(images/amazonandpinterest.png);
        background-size: 200% 200%;
        background-position: 100% 50%;
      }

      .yt-embed {
        display: flex;
        justify-content: center;
        margin-top: auto;
        margin-bottom: 10px;
      }

      .yt-embed iframe {
        border-radius: 10px;
        opacity: 0.85;
      }

      .yt-embed-wrapper {
        position: relative;
        display: inline-block;
      }

      .playlist-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 212, 255, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: all 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .playlist-btn:hover {
        background: rgba(0, 212, 255, 0.2);
        border-color: #00d4ff;
      }

      .playlist-btn svg {
        width: 13px;
        height: 13px;
        color: #00d4ff;
      }

      .playlist-popup {
        display: none;
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 14, 39, 0.95);
        border: 1px solid rgba(0, 212, 255, 0.4);
        border-radius: 10px;
        padding: 10px;
        width: 220px;
        z-index: 20;
        backdrop-filter: blur(10px);
      }

      .playlist-popup.open {
        display: block;
      }

      .playlist-popup input {
        width: 100%;
        background: transparent;
        border: 1px solid rgba(0, 212, 255, 0.4);
        border-radius: 6px;
        padding: 7px 10px;
        color: #fff;
        font-size: 12px;
        outline: none;
        box-sizing: border-box;
      }

      .playlist-popup input::placeholder {
        color: rgba(0, 212, 255, 0.5);
      }

      .playlist-popup-actions {
        display: flex;
        gap: 6px;
        margin-top: 7px;
      }

      .playlist-popup-actions button {
        flex: 1;
        padding: 6px;
        border-radius: 6px;
        border: none;
        font-size: 20px;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .playlist-confirm {
        background: #00d4ff;
        color: #0a0e27;
        font-weight: 600;
      }

      .playlist-cancel {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .playlist-popup-actions button:hover {
        opacity: 0.8;
      }

      .quote {
        text-align: center;
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 0.75em;
        color: #00d4ff;
        opacity: 0.5;
        font-style: italic;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.4;
      }

      @media (max-width: 480px) {
        .header h1 {
          font-size: 2em;
        }

        .quick-links {
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
          gap: 12px;
        }

        .link-card {
          padding: 15px;
        }
      }

      /* ========== WALLPAPER PICKER ========== */
      .footer {
        cursor: pointer;
        user-select: none;
      }

      .footer:hover {
        opacity: 1;
      }

      .wp-picker {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(5, 9, 28, 0.92);
        backdrop-filter: blur(10px);
        border-top: 2px solid rgba(255,255,255,0.15);
        padding: 16px;
        z-index: 100;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }

      .wp-picker.open {
        display: block;
        transform: translateY(0);
      }

      .wp-picker-label {
        font-family: "VT323", monospace;
        font-size: 18px;
        color: rgba(255,255,255,0.5);
        text-align: center;
        margin-bottom: 12px;
        letter-spacing: 2px;
      }

      .wp-thumbs {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .wp-thumb {
        width: 56px;
        height: 80px;
        background-size: cover;
        background-position: center;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.15s ease;
        flex-shrink: 0;
      }

      .wp-thumb.active {
        border-color: #cccccc;
      }

      .wp-thumb:hover {
        border-color: rgba(255,255,255,0.5);
      }

      .wp-darkness {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .wp-darkness-label {
        font-family: "VT323", monospace;
        font-size: 16px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 1px;
        white-space: nowrap;
      }

      .wp-darkness input[type=range] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: rgba(255,255,255,0.2);
        outline: none;
        border-radius: 0;
      }

      .wp-darkness input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #cccccc;
        cursor: pointer;
        border-radius: 0;
      }

      .wp-darkness input[type=range]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #cccccc;
        cursor: pointer;
        border-radius: 0;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="gradient-bg" style="display:none"></div>
    <div class="container">
      <div class="search-box">
        <form class="search-form" onsubmit="return handleSearch(event);">
          <input
            type="text"
            class="search-input"
            placeholder=""
            id="searchInput"
            autocomplete="off"
          />
          <button type="submit" class="search-btn">
            <img src="images/right-arrow.png" alt="search" />
          </button>
        </form>
      </div>

      <div class="quick-links">
        <button
          class="youtube-btn"
          onclick="
            searchOn('https://www.youtube.com/results?search_query=', this)
          "
        >
          <img
            src="images/ytlogo.png"
            class="pixel-icon yt-icon"
            alt="YouTube"
          />
        </button>

        <button
          class="amazon-btn"
          onclick="searchOn('https://www.amazon.in/s?k=', this)"
        >
          <div class="pixel-icon amazon-icon"></div>
        </button>

        <button
          class="pinterest-btn"
          onclick="searchOn('https://in.pinterest.com/search/pins/?q=', this)"
        >
          <div class="pixel-icon pinterest-icon"></div>
        </button>
      </div>

      <div class="yt-embed">
        <div class="yt-embed-wrapper">
          <iframe
            id="yt-iframe"
            width="320"
            height="180"
            src="https://www.youtube.com/embed/oe4XJ851oOk?enablejsapi=1&rel=0&loop=1&playsinline=1&modestbranding=1&autoplay=0&vq=tiny"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              encrypted-media;
              gyroscope;
              picture-in-picture;
            "
            allowfullscreen
          ></iframe>
          <button
            class="playlist-btn"
            onclick="togglePlaylistPopup(event)"
            title="Load playlist"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <polyline points="3 6 4 7 6 5" />
              <polyline points="3 12 4 13 6 11" />
              <polyline points="3 18 4 19 6 17" />
            </svg>
          </button>
          <div class="playlist-popup" id="playlistPopup">
            <input
              type="text"
              id="playlistInput"
              placeholder="Paste YouTube playlist URL"
            />
            <div class="playlist-popup-actions">
              <button class="playlist-confirm" onclick="loadPlaylist()">
                Load
              </button>
              <button class="playlist-cancel" onclick="closePlaylistPopup()">
                Cancel
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="quote" id="quoteText"></div>
      <div class="footer" onclick="toggleWallpaperPicker()">made with ❤️ by zeet</div>
    </div>

    <div class="wp-picker" id="wpPicker">
      <div class="wp-picker-label">WALLPAPER</div>
      <div class="wp-thumbs">
        <div class="wp-thumb" id="wp-1" style="background-image:url(images/wallpaper1.gif)" onclick="setWallpaper(1)"></div>
        <div class="wp-thumb" id="wp-2" style="background-image:url(images/wallpaper2.gif)" onclick="setWallpaper(2)"></div>
        <div class="wp-thumb" id="wp-3" style="background-image:url(images/wallpaper3.gif)" onclick="setWallpaper(3)"></div>
        <div class="wp-thumb" id="wp-4" style="background-image:url(images/wallpaper4.webp)" onclick="setWallpaper(4)"></div>
        <div class="wp-thumb" id="wp-5" style="background-image:url(images/wallpaper5.gif)" onclick="setWallpaper(5)"></div>
      </div>
      <div class="wp-darkness">
        <span class="wp-darkness-label">DARK</span>
        <input type="range" id="darknessSlider" min="0" max="90" value="55" oninput="setDarkness(this.value)" />
      </div>
    </div>

    <script>
      // ========== QUOTE OF THE DAY ==========
      const quotes = [
        "to become who you want to be you need to sacrifice who you are",
        "have confidence in the very air that surrounds you",
        "you can't fix everything at once but you can fix something right now",
        "needing nothing attracts everything",
        "who am i to judge when i myself walk as an imperfect man",
        "you cannot suffer the past and future, because they do not exist",
        "in the war of ego the loser always wins",
        "being angry is like drinking poison and expecting the other person to die",
        "to be a star you must burn",
        "observe, but don't absorb",
        "the world is cruel, therefore i won't be",
        "comfort is the worst addiction",
        "a person chosen by god will never be chosen by humans",
      ];

      function getDayOfYear() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay);
      }

      // Set quote based on day of year
      const quoteIndex = getDayOfYear() % quotes.length;
      document.getElementById("quoteText").textContent = quotes[quoteIndex];

      // ========== SEARCH ANIMATION LOGIC ==========
      const searchForm = document.querySelector(".search-form");
      const searchInput = document.getElementById("searchInput");
      let originalPlaceholder = "";

      function searchOn(url, buttonElement) {
        const query = searchInput.value.trim();
        if (!query) return;

        // Trigger search bar animation
        triggerSearchAnimation();

        // Navigate after animation completes
        setTimeout(() => {
          window.location.href = url + encodeURIComponent(query);
        }, 1200);
      }

      // Handle search with animation
      function handleSearch(event) {
        event.preventDefault();
        const query = searchInput.value.trim();

        if (!query) return false;

        // Trigger search animation
        triggerSearchAnimation();

        // Check if it's a URL
        const urlPattern = /^(https?:\/\/)|(www\.)|(\w+\.\w+)/;

        setTimeout(() => {
          if (urlPattern.test(query)) {
            const url = query.startsWith("http") ? query : "https://" + query;
            window.location.href = url;
          } else {
            // Search on Google
            window.location.href =
              "https://www.google.com/search?q=" + encodeURIComponent(query);
          }
        }, 300);

        return false;
      }

      // Search animation function
      function triggerSearchAnimation() {
        searchForm.classList.add("searching");
        originalPlaceholder = searchInput.placeholder;
        searchInput.value = "Searching...";
        searchInput.style.pointerEvents = "none";
      }

      //Auto Focus
      document.querySelector(".container").addEventListener("click", () => {
        searchInput.focus();
      });
      // Prevent auto focus on these
      document.querySelectorAll(".social-button,.search-form").forEach((e) => {
        e.addEventListener("click", () => {
          e.stopPropagation();
        });
      });

      // ========== PLAYLIST LOADER ==========
      function togglePlaylistPopup(e) {
        e.stopPropagation();
        document.getElementById("playlistPopup").classList.toggle("open");
        setTimeout(() => document.getElementById("playlistInput").focus(), 50);
      }

      function closePlaylistPopup() {
        document.getElementById("playlistPopup").classList.remove("open");
      }

      function loadPlaylist() {
        const raw = document.getElementById("playlistInput").value.trim();
        const match = raw.match(/[?&]list=([a-zA-Z0-9_-]+)/);
        if (!match) {
          document.getElementById("playlistInput").style.borderColor =
            "rgba(255,80,80,0.7)";
          setTimeout(
            () =>
              (document.getElementById("playlistInput").style.borderColor = ""),
            1200,
          );
          return;
        }
        const listId = match[1];
        document.getElementById("yt-iframe").src =
          "https://www.youtube.com/embed/?listType=playlist&list=" +
          listId +
          "&enablejsapi=1&rel=0&playsinline=1&modestbranding=1&autoplay=1&index=0&vq=tiny";
        closePlaylistPopup();
        document.getElementById("playlistInput").value = "";
      }

      // Close popup when tapping outside
      document.addEventListener("click", (e) => {
        const popup = document.getElementById("playlistPopup");
        if (
          popup.classList.contains("open") &&
          !popup.closest(".yt-embed-wrapper").contains(e.target)
        ) {
          closePlaylistPopup();
        }
      });

      // ========== WALLPAPER PICKER ==========
      const wallpapers = {
        1: 'images/wallpaper1.gif',
        2: 'images/wallpaper2.gif',
        3: 'images/wallpaper3.gif',
        4: 'images/wallpaper4.webp',
        5: 'images/wallpaper5.gif',
      };

      function setWallpaper(n) {
        document.body.style.backgroundImage = `url(${wallpapers[n]})`;
        document.querySelectorAll('.wp-thumb').forEach(t => t.classList.remove('active'));
        document.getElementById('wp-' + n).classList.add('active');
        localStorage.setItem('wallpaper', n);
      }

      function setDarkness(value) {
        document.body.style.setProperty('--overlay-opacity', value / 100);
        localStorage.setItem('darkness', value);
      }

      function toggleWallpaperPicker() {
        document.getElementById('wpPicker').classList.toggle('open');
      }

      // Close picker when tapping outside
      document.addEventListener('click', (e) => {
        const picker = document.getElementById('wpPicker');
        if (picker.classList.contains('open') &&
            !picker.contains(e.target) &&
            !e.target.closest('.footer')) {
          picker.classList.remove('open');
        }
      });

      // Load saved wallpaper
      const savedWp = localStorage.getItem('wallpaper') || 1;
      setWallpaper(savedWp);

      // Load saved darkness
      const savedDarkness = localStorage.getItem('darkness') || 55;
      document.getElementById('darknessSlider').value = savedDarkness;
      setDarkness(savedDarkness);
    </script>
  </body>
</html>
